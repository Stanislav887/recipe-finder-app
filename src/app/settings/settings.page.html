<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>👤 My Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="profile-content">

  <!-- Profile Header -->
  <div class="profile-header">

    <div class="avatar">
      📱
    </div>

    <h2>Device Profile</h2>
    <p class="subtitle">Powered by Capacitor Device Plugin</p>

  </div>

  <!-- Device Info Card -->
  <ion-card class="profile-card">

    <ion-card-content>

      <div class="info-row">
        <span>📍 Platform</span>
        <span>{{ deviceInfo?.platform }}</span>
      </div>

      <div class="info-row">
        <span>💻 OS</span>
        <span>{{ deviceInfo?.operatingSystem }}</span>
      </div>

      <div class="info-row">
        <span>🔢 Version</span>
        <span>{{ deviceInfo?.osVersion }}</span>
      </div>

      <div class="info-row">
        <span>📱 Model</span>
        <span>{{ deviceInfo?.model }}</span>
      </div>

    </ion-card-content>

  </ion-card>

  <!-- Refresh Button -->
  <ion-button expand="block" class="refresh-btn" (click)="getDeviceInfo()">
    🔄 Refresh Device Info
  </ion-button>

</ion-content>
