<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>⚙️ Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>📱 Device Information</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <p>📍 <strong>Platform:</strong> {{ deviceInfo?.platform }}</p>
      <p><strong>Operating System:</strong> {{ deviceInfo?.operatingSystem }}</p>
      <p><strong>OS Version:</strong> {{ deviceInfo?.osVersion }}</p>
      <p><strong>Model:</strong> {{ deviceInfo?.model }}</p>

    </ion-card-content>

  </ion-card>

  <ion-button expand="block" (click)="getDeviceInfo()">
    Refresh Device Info
  </ion-button>
</ion-content>
