<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ meal?.strMeal }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card>

    <img [src]="meal?.strMealThumb" />

    <ion-card-header>
      <ion-card-title>{{ meal?.strMeal }}</ion-card-title>
      <ion-card-subtitle>
        {{ meal?.strCategory }} • {{ meal?.strArea }}
      </ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <h3>
        <ion-icon name="restaurant-outline"></ion-icon>
        Ingredients
      </h3>

      <ion-list>
        <ion-item *ngFor="let item of ingredients">
          {{ item }}
        </ion-item>
      </ion-list>

      <h3>
        <ion-icon name="list-outline"></ion-icon>
        Instructions
      </h3>

      <p>{{ meal?.strInstructions }}</p>

    </ion-card-content>

  </ion-card>


</ion-content>
