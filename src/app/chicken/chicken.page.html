<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Chicken Recipes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card *ngFor="let recipe of recipes">

    <img 
      [src]="recipe.strMealThumb" 
      style="width: 50%; height: 300px; object-fit: cover;" 
    />

    <ion-card-header>
      <ion-card-title>
        {{ recipe.strMeal }}
      </ion-card-title>
    </ion-card-header>

  </ion-card>

</ion-content>
