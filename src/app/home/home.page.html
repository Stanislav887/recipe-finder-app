<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Recipe Finder
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Recipe Finder</ion-title>
    </ion-toolbar>
  </ion-header>

<ion-input 
  [(ngModel)]="searchTerm" 
  placeholder="Enter ingredient">
</ion-input>

<ion-button expand="full">
  Search Recipes
</ion-button>

</ion-content>
