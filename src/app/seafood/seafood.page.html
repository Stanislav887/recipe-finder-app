<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Seafood Recipes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card *ngFor="let recipe of recipes">

    <img [src]="recipe.strMealThumb" />

    <ion-card-header>
      <ion-card-title>
        {{ recipe.strMeal }}
      </ion-card-title>
    </ion-card-header>

  </ion-card>

</ion-content>
