<ion-content [fullscreen]="true">

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">results</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card *ngFor="let recipe of recipes">

    <img [src]="recipe.strMealThumb" />

    <ion-card-header>
      <ion-card-title>
        {{ recipe.strMeal }}
      </ion-card-title>
    </ion-card-header>

  </ion-card>

</ion-content>
