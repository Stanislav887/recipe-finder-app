<ion-header [translucent]="true">
  <ion-toolbar color="primary">

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="Back"></ion-back-button>
    </ion-buttons>

    <ion-title>⭐ Your Favourites</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="favourites-content">

  @if (favourites.length === 0) {
  <div class="empty-state">
    <h2>😢 No favourites yet</h2>
    <p>Add recipes to see them here</p>
  </div>
  }

  @for (meal of favourites; track meal.idMeal) {
  <ion-card class="item-card">

    <img [src]="meal.strMealThumb" />

    <ion-card-header>
      <ion-card-title>{{ meal.strMeal }}</ion-card-title>
      <ion-card-subtitle>{{ meal.strCategory }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <ion-button expand="block" color="danger" (click)="removeFromFavourites(meal.idMeal)">
        ❌ Remove
      </ion-button>

    </ion-card-content>

  </ion-card>
  }

</ion-content>
