<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Favourites</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card *ngFor="let meal of favorites">

    <img [src]="meal.strMealThumb" />

    <ion-card-header>
      <ion-card-title>
        {{ meal.strMeal }}
      </ion-card-title>
    </ion-card-header>

  </ion-card>

</ion-content>
